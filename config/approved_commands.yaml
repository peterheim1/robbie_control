# Approved commands for the Robbie web interface.
# Only commands listed here can be executed via the Docs tab "Run on robot" button.
# background: true  — long-running process; output streams into a result window.
# background: false — one-shot; waits for completion and shows output.
# keywords:         — extra search terms used by relevant_commands() matching.

commands:

  # ── Safety / recovery ──────────────────────────────────────────────────────
  - id: reset_estop
    label: "Reset ESP32 ESTOP / WDOG"
    cmd: "ros2 service call /cal std_srvs/srv/Empty"
    background: false
    keywords: [estop, reset, watchdog, wdog, stuck, steering, recovery, cal]

  # ── ESP32 config ───────────────────────────────────────────────────────────
  - id: esp32_query_config
    label: "Query ESP32 firmware config"
    cmd: "ros2 run robbie_bot esp32_config.py"
    background: false
    keywords: [esp32, firmware, config, pid, kp, ki, kd, maxrate, stallms, wdogms,
               watchdog, deadband, steering, query, motor, gains]

  - id: esp32_set_sysconfig
    label: "Set ESP32 sysconfig (maxRate stallMs wdogMs)"
    cmd: "ros2 run robbie_bot esp32_config.py --set-sysconfig 4000 2000 10000"
    background: false
    keywords: [maxrate, stallms, wdogms, watchdog, timeout, sysconfig, rate, stall,
               speed, limit, base, driver, config, change, adjust]

  - id: esp32_set_pid_all
    label: "Set ESP32 PID gains (all motors)"
    cmd: "ros2 run robbie_bot esp32_config.py --set-pid-all 10.0 0.5 1.0"
    background: false
    keywords: [pid, kp, ki, kd, gains, proportional, integral, derivative,
               tuning, steering, motor, oscillation, overshoot]

  - id: esp32_interactive
    label: "ESP32 config interactive menu"
    cmd: "ros2 run robbie_bot esp32_config.py --interactive"
    background: false
    keywords: [esp32, interactive, menu, config, pid, firmware, adjust, change,
               set, steering, direction, calibrate, direction, direction]

  # ── Diagnostics ────────────────────────────────────────────────────────────
  - id: check_health
    label: "Echo health summary"
    cmd: "ros2 topic echo /health_summary --once"
    background: false
    keywords: [health, status, summary, diagnose, check, nodes, system]

  - id: list_nodes
    label: "List ROS2 nodes"
    cmd: "ros2 node list"
    background: false
    keywords: [nodes, running, processes, list, active]

  - id: list_topics
    label: "List ROS2 topics"
    cmd: "ros2 topic list"
    background: false
    keywords: [topics, published, subscribed, list, active, streams]

  - id: battery_voltage
    label: "Check battery voltage"
    cmd: "ros2 topic echo /battery_voltage --once"
    background: false
    keywords: [battery, voltage, charge, power, level, volts]

  - id: steering_status
    label: "Check steering / ESP32 status"
    cmd: "ros2 topic echo /steering_status --once"
    background: false
    keywords: [steering, esp32, status, estop, wdog, fault, i2c, encoder, stall, ok]

  - id: check_odom
    label: "Check odometry"
    cmd: "ros2 topic echo /odom --once"
    background: false
    keywords: [odom, odometry, position, pose, velocity, location, where]

  - id: list_controllers
    label: "List ros2_control controllers"
    cmd: "ros2 service call /controller_manager/list_controllers controller_manager_msgs/srv/ListControllers"
    background: false
    keywords: [controllers, arm, head, gripper, joint, ros2_control, servo,
               feetech, active, inactive, hardware]

  # ── Navigation ─────────────────────────────────────────────────────────────
  - id: start_docking
    label: "Start docking"
    cmd: "ros2 service call /start_docking std_srvs/srv/Empty"
    background: false
    keywords: [dock, docking, charge, home, station, april, tag, charger]

  - id: undock
    label: "Undock"
    cmd: "ros2 service call /undock std_srvs/srv/Empty"
    background: false
    keywords: [undock, leave, depart, undocking, drive, away]

  # ── Node restarts ──────────────────────────────────────────────────────────
  - id: restart_base_driver
    label: "Restart base driver"
    cmd: "ros2 launch robbie_bot base_driver.launch.py"
    background: true
    keywords: [restart, base, driver, motors, steering, relaunch, bringup]

  - id: restart_navigation
    label: "Restart navigation"
    cmd: "ros2 launch robbie_bot navigation_launch.py"
    background: true
    keywords: [restart, navigation, nav2, planner, controller, relaunch, bringup]

  - id: restart_voice
    label: "Restart voice server"
    cmd: "/home/pi/ros2_ws/src/robbie_control/start.sh"
    background: true
    keywords: [restart, voice, server, stt, tts, speech, relaunch, whisper, piper]

  # ── Tests ──────────────────────────────────────────────────────────────────
  - id: run_latency_blocks
    label: "Run latency test (wheels in air)"
    cmd: "ros2 run robbie_bot latency_test.py --ros-args -p mode:=blocks"
    background: true
    keywords: [latency, test, benchmark, performance, blocks, wheels, measure]

  - id: run_latency_floor
    label: "Run latency test (floor drive)"
    cmd: "ros2 run robbie_bot latency_test.py --ros-args -p mode:=floor"
    background: true
    keywords: [latency, test, benchmark, performance, floor, drive, measure]
